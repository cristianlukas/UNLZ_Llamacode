<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 SNAKE - Retro Edition</title>
<style>
  @font-face {
    font-family: 'PixelFont';
    src: url('data:font/woff2;base64,') format('woff2');
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #1a1a2e;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    image-rendering: pixelated;
  }
  #game-wrapper {
    position: relative;
    background: #0f0f23;
    border: 4px solid #e0e0e0;
    box-shadow: 0 0 30px rgba(0,255,0,0.15), inset 0 0 60px rgba(0,0,0,0.5);
    border-radius: 4px;
  }
  #header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 16px;
    background: #16213e;
    border-bottom: 2px solid #333;
    color: #0f0;
    font-size: 14px;
    letter-spacing: 2px;
  }
  #header .score { color: #0f0; text-shadow: 0 0 8px #0f0; }
  #header .high { color: #ff0; text-shadow: 0 0 8px #ff0; }
  #header .title { color: #0f0; font-size: 18px; font-weight: bold; text-shadow: 0 0 10px #0f0; }
  canvas { display: block; background: #0a0a1a; }
  #footer {
    padding: 6px 16px;
    background: #16213e;
    border-top: 2px solid #333;
    color: #666;
    font-size: 11px;
    text-align: center;
    letter-spacing: 1px;
  }
  #overlay {
    position: absolute; top:0; left:0; right:0; bottom:0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    background: rgba(0,0,0,0.85);
    color: #0f0;
    z-index: 10;
    transition: opacity 0.3s;
  }
  #overlay.hidden { opacity:0; pointer-events:none; }
  #overlay h1 { font-size: 36px; text-shadow: 0 0 20px #0f0; margin-bottom: 10px; letter-spacing: 4px; }
  #overlay h2 { font-size: 24px; color: #f44; text-shadow: 0 0 15px #f44; margin-bottom: 10px; }
  #overlay p { font-size: 14px; color: #aaa; margin: 4px 0; letter-spacing: 1px; }
  #overlay .blink { animation: blink 1s step-end infinite; color: #0f0; margin-top: 20px; font-size: 16px; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
  #mobile-controls {
    display: none;
    position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
    z-index: 20;
  }
  #mobile-controls button {
    width: 56px; height: 56px;
    background: rgba(0,255,0,0.15);
    border: 2px solid #0f0;
    color: #0f0; font-size: 24px;
    cursor: pointer;
    border-radius: 6px;
    touch-action: manipulation;
  }
  #mobile-controls button:active { background: rgba(0,255,0,0.4); }
  .dpad { display: grid; grid-template-columns: 56px 56px 56px; grid-template-rows: 56px 56px 56px; gap: 4px; }
  .dpad .empty { visibility: hidden; }
  @media (max-width: 700px) {
    #mobile-controls { display: block; }
    #footer { display: none; }
  }
  @media (pointer: coarse) {
    #mobile-controls { display: block; }
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="header">
    <span class="title">🐍 SNAKE</span>
    <span class="score">SCORE: <span id="score-val">0</span></span>
    <span class="high">HI: <span id="hi-val">0</span></span>
  </div>
  <canvas id="game"></canvas>
  <div id="footer">▲ ▼ ◄ ► / WASD — SPACE: Pause — P: Pause</div>
  <div id="overlay">
    <h1>🐍 SNAKE</h1>
    <p>RETRO EDITION</p>
    <p class="blink">PRESS ENTER OR SPACE TO START</p>
  </div>
</div>

<div id="mobile-controls">
  <div class="dpad">
    <div class="empty"></div>
    <button id="btn-up">▲</button>
    <div class="empty"></div>
    <button id="btn-left">◄</button>
    <button id="btn-pause">⏸</button>
    <button id="btn-right">►</button>
    <div class="empty"></div>
    <button id="btn-down">▼</button>
    <div class="empty"></div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────
const COLS = 30, ROWS = 24;
const CELL = 18;
const W = COLS * CELL, H = ROWS * CELL;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score-val');
const hiEl = document.getElementById('hi-val');

// ─── AUDIO (Web Audio API, no external files) ────────────
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, dur, type='square', vol=0.12) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}
function sfxEat()  { playTone(600, 0.1, 'square', 0.15); setTimeout(()=>playTone(900,0.1,'square',0.12), 60); }
function sfxDie()  { playTone(200, 0.3, 'sawtooth', 0.18); setTimeout(()=>playTone(100,0.4,'sawtooth',0.15), 150); }
function sfxMove() { /* silent for performance */ }
function sfxStart(){ [400,500,600,800].forEach((f,i)=>setTimeout(()=>playTone(f,0.08,'square',0.1),i*80)); }
function sfxBonus(){ [500,700,900,1200].forEach((f,i)=>setTimeout(()=>playTone(f,0.12,'square',0.15),i*70)); }

// ─── STATE ───────────────────────────────────────────────
let snake, dir, nextDir, food, bonusFood, score, hiScore, speed, state;
let lastTime, tickAccum, particles, shakeTimer;
let bonusTimer = 0, bonusDuration = 0;

hiScore = parseInt(localStorage.getItem('snake_hi') || '0');
hiEl.textContent = hiScore;

// ─── PARTICLES ───────────────────────────────────────────
particles = [];
function spawnParticles(x, y, color, count=8) {
  for (let i=0; i<count; i++) {
    particles.push({
      x: x * CELL + CELL/2, y: y * CELL + CELL/2,
      vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
      life: 15 + Math.random()*15, maxLife: 30,
      color: color, size: 2 + Math.random()*3
    });
  }
}
function updateParticles() {
  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), Math.ceil(p.size), Math.ceil(p.size));
  }
  ctx.globalAlpha = 1;
}

// ─── INIT GAME ───────────────────────────────────────────
function initGame() {
  const midX = Math.floor(COLS/2), midY = Math.floor(ROWS/2);
  snake = [{x:midX,y:midY},{x:midX-1,y:midY},{x:midX-2,y:midY}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; speed = 120;
  scoreEl.textContent = '0';
  food = spawnFood();
  bonusFood = null; bonusTimer = 0; bonusDuration = 0;
  particles = []; shakeTimer = 0;
  state = 'playing';
  overlay.classList.add('hidden');
  sfxStart();
  lastTime = performance.now(); tickAccum = 0;
}

function spawnFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  return pos;
}

function spawnBonusFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
  } while (snake.some(s => s.x===pos.x && s.y===pos.y) || (food.x===pos.x && food.y===pos.y));
  bonusFood = pos;
  bonusDuration = 120; // frames
}

// ─── GAME LOOP ───────────────────────────────────────────
function gameLoop(now) {
  requestAnimationFrame(gameLoop);
  if (state !== 'playing') return;
  const dt = now - lastTime;
  lastTime = now;
  tickAccum += dt;

  // Screen shake decay
  if (shakeTimer > 0) shakeTimer--;

  // Bonus food timer
  if (bonusFood) {
    bonusDuration--;
    if (bonusDuration <= 0) bonusFood = null;
  }

  // Random bonus spawn
  if (!bonusFood && Math.random() < 0.002) spawnBonusFood();

  // Tick
  while (tickAccum >= speed) {
    tickAccum -= speed;
    update();
  }

  // Render
  render();
  updateParticles();
}

function update() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return die();
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return die();
  }

  snake.unshift(head);

  // Eat food
  let ate = false;
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    ate = true;
    sfxEat();
    spawnParticles(food.x, food.y, '#f00', 10);
    food = spawnFood();
    // Speed up
    speed = Math.max(55, 120 - Math.floor(score / 50) * 5);
  } else if (bonusFood && head.x === bonusFood.x && head.y === bonusFood.y) {
    score += 50;
    ate = true;
    sfxBonus();
    spawnParticles(bonusFood.x, bonusFood.y, '#ff0', 16);
    bonusFood = null; bonusDuration = 0;
  } else {
    snake.pop();
  }

  if (ate) {
    scoreEl.textContent = score;
    if (score > hiScore) {
      hiScore = score;
      hiEl.textContent = hiScore;
      localStorage.setItem('snake_hi', hiScore);
    }
  }
}

function die() {
  state = 'dead';
  sfxDie();
  shakeTimer = 15;
  // Particles on whole snake
  for (const s of snake) spawnParticles(s.x, s.y, '#0f0', 3);
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h2>GAME OVER</h2>
    <p>SCORE: ${score}</p>
    <p style="color:#ff0">HI: ${hiScore}</p>
    <p class="blink">PRESS ENTER OR SPACE TO RETRY</p>
  `;
}

// ─── RENDER ──────────────────────────────────────────────
function render() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    const sx = (Math.random()-0.5) * shakeTimer * 0.8;
    const sy = (Math.random()-0.5) * shakeTimer * 0.8;
    ctx.translate(sx, sy);
  }

  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // Grid (subtle)
  ctx.fillStyle = '#0f0f25';
  for (let x=0; x<COLS; x++) {
    for (let y=0; y<ROWS; y++) {
      if ((x+y) % 2 === 0) ctx.fillRect(x*CELL, y*CELL, CELL, CELL);
    }
  }

  // Border
  ctx.strokeStyle = '#1a3a1a';
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, W-2, H-2);

  // Food (apple - 8-bit style)
  drawApple(food.x, food.y);

  // Bonus food (star)
  if (bonusFood) {
    const blink = bonusDuration < 40 && Math.floor(bonusDuration/4) % 2;
    if (!blink) drawStar(bonusFood.x, bonusFood.y);
  }

  // Snake
  for (let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];
    if (i === 0) {
      // Head
      ctx.fillStyle = '#4f4';
      ctx.fillRect(s.x*CELL, s.y*CELL, CELL, CELL);
      // Eyes
      ctx.fillStyle = '#000';
      const ex = dir.x === 1 ? 11 : dir.x === -1 ? 3 : 5;
      const ey = dir.y === 1 ? 11 : dir.y === -1 ? 3 : 5;
      ctx.fillRect(s.x*CELL + ex, s.y*CELL + ey, 3, 3);
      ctx.fillRect(s.x*CELL + (dir.x===0?10:ex+4), s.y*CELL + (dir.y===0?10:ey+4), 3, 3);
      // Tongue
      if (tickAccum > speed * 0.5) {
        ctx.fillStyle = '#f44';
        const tx = s.x*CELL + CELL/2 + dir.x * 6;
        const ty = s.y*CELL + CELL/2 + dir.y * 6;
        ctx.fillRect(tx-1, ty-1, 3, 3);
      }
    } else {
      // Body - gradient from green to teal
      const t = i / snake.length;
      const r = Math.floor(0 + t * 0);
      const g = Math.floor(200 - t * 100);
      const b = Math.floor(50 + t * 50);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
      // Pixel pattern
      ctx.fillStyle = `rgb(${r+30},${g+30},${b+30})`;
      ctx.fillRect(s.x*CELL+3, s.y*CELL+3, CELL-6, CELL-6);
    }
  }

  // Particles
  drawParticles();

  // Scanlines overlay
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  for (let y = 0; y < H; y += 3) {
    ctx.fillRect(0, y, W, 1);
  }

  // CRT vignette
  const grad = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.7);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.3)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.restore();
}

function drawApple(cx, cy) {
  const x = cx * CELL, y = cy * CELL;
  const s = CELL;
  // Apple body
  ctx.fillStyle = '#d00';
  ctx.fillRect(x+3, y+3, s-6, s-5);
  ctx.fillRect(x+2, y+4, s-4, s-7);
  // Highlight
  ctx.fillStyle = '#f66';
  ctx.fillRect(x+4, y+4, 3, 3);
  // Stem
  ctx.fillStyle = '#650';
  ctx.fillRect(x + Math.floor(s/2)-1, y+1, 2, 3);
  // Leaf
  ctx.fillStyle = '#0a0';
  ctx.fillRect(x + Math.floor(s/2)+1, y+1, 3, 2);
}

function drawStar(cx, cy) {
  const x = cx * CELL, y = cy * CELL;
  const s = CELL;
  ctx.fillStyle = '#ff0';
  // Simple star shape
  ctx.fillRect(x+Math.floor(s/2)-1, y+1, 2, s-2);
  ctx.fillRect(x+1, y+Math.floor(s/2)-1, s-2, 2);
  ctx.fillRect(x+3, y+3, s-6, s-6);
  ctx.fillStyle = '#fa0';
  ctx.fillRect(x+5, y+5, s-10, s-10);
}

// ─── INPUT ───────────────────────────────────────────────
const DIRS = {
  ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1}, ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
  w: {x:0,y:-1}, s: {x:0,y:1}, a: {x:-1,y:0}, d: {x:1,y:0},
  W: {x:0,y:-1}, S: {x:0,y:1}, A: {x:-1,y:0}, D: {x:1,y:0}
};

document.addEventListener('keydown', e => {
  ensureAudio();
  const d = DIRS[e.key];
  if (d) {
    e.preventDefault();
    if (state === 'playing') {
      // Prevent 180° turn
      if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
    }
  }
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    if (state === 'idle' || state === 'dead') initGame();
  }
  if (e.key === 'p' || e.key === 'P') {
    if (state === 'playing') {
      state = 'paused';
      overlay.classList.remove('hidden');
      overlay.innerHTML = `<h2>PAUSED</h2><p class="blink">PRESS P TO RESUME</p>`;
    } else if (state === 'paused') {
      state = 'playing';
      overlay.classList.add('hidden');
      lastTime = performance.now(); tickAccum = 0;
    }
  }
});

// Mobile controls
document.getElementById('btn-up').addEventListener('click', ()=>{ ensureAudio(); if(state==='playing' && dir.y!==1) nextDir={x:0,y:-1}; });
document.getElementById('btn-down').addEventListener('click', ()=>{ ensureAudio(); if(state==='playing' && dir.y!==-1) nextDir={x:0,y:1}; });
document.getElementById('btn-left').addEventListener('click', ()=>{ ensureAudio(); if(state==='playing' && dir.x!==1) nextDir={x:-1,y:0}; });
document.getElementById('btn-right').addEventListener('click', ()=>{ ensureAudio(); if(state==='playing' && dir.x!==-1) nextDir={x:1,y:0}; });
document.getElementById('btn-pause').addEventListener('click', ()=>{
  ensureAudio();
  if(state==='playing'){ state='paused'; overlay.classList.remove('hidden'); overlay.innerHTML=`<h2>PAUSED</h2><p class="blink">PRESS P TO RESUME</p>`; }
  else if(state==='paused'){ state='playing'; overlay.classList.add('hidden'); lastTime=performance.now(); tickAccum=0; }
  else if(state==='idle'||state==='dead'){ initGame(); }
});

// Touch swipe support
let touchStartX, touchStartY;
canvas.addEventListener('touchstart', e => {
  ensureAudio();
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});
canvas.addEventListener('touchend', e => {
  if (state !== 'playing') return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0 && dir.x !== -1) nextDir = {x:1,y:0};
    else if (dx < 0 && dir.x !== 1) nextDir = {x:-1,y:0};
  } else {
    if (dy > 0 && dir.y !== -1) nextDir = {x:0,y:1};
    else if (dy < 0 && dir.y !== 1) nextDir = {x:0,y:-1};
  }
}, {passive:true});

// ─── START ───────────────────────────────────────────────
state = 'idle';
lastTime = performance.now(); tickAccum = 0;
requestAnimationFrame(gameLoop);

// Initial render
render();
</script>
</body>
</html>
