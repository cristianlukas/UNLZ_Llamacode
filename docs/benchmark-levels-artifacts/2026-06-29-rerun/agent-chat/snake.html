<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE 8-BIT</title>
<style>
  @font-face {
    font-family: 'PixelFont';
    src: url(data:font/woff2;base64,) format('woff2');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f0f;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    image-rendering: pixelated;
  }
  #game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.15) 0px,
      rgba(0,0,0,0.15) 1px,
      transparent 1px,
      transparent 3px
    );
  }
  #crt-flicker {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 998;
    animation: flicker 0.15s infinite;
    opacity: 0;
  }
  @keyframes flicker {
    0% { opacity: 0; }
    50% { opacity: 0.02; }
    100% { opacity: 0; }
  }
  #hud {
    display: flex;
    justify-content: space-between;
    width: 640px;
    padding: 8px 0;
    color: #33ff33;
    font-size: 18px;
    text-shadow: 0 0 8px #33ff33, 0 0 2px #33ff33;
    letter-spacing: 2px;
  }
  #hud span { font-weight: bold; }
  canvas {
    border: 4px solid #33ff33;
    box-shadow: 0 0 20px #33ff3344, inset 0 0 20px #33ff3311;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000a00;
  }
  #overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #33ff33;
    text-shadow: 0 0 10px #33ff33;
    z-index: 10;
    pointer-events: none;
  }
  #overlay.hidden { display: none; }
  #overlay h1 {
    font-size: 48px;
    letter-spacing: 8px;
    margin-bottom: 10px;
    animation: pulse 1s ease-in-out infinite alternate;
  }
  #overlay h2 {
    font-size: 28px;
    letter-spacing: 4px;
    margin-bottom: 10px;
  }
  #overlay p {
    font-size: 16px;
    margin-top: 15px;
    animation: blink 1s step-end infinite;
  }
  #overlay .score-display {
    font-size: 22px;
    margin: 10px 0;
    color: #ffcc00;
    text-shadow: 0 0 10px #ffcc00;
  }
  @keyframes pulse {
    from { opacity: 0.8; transform: scale(1); }
    to { opacity: 1; transform: scale(1.05); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  #controls-hint {
    margin-top: 12px;
    color: #33ff3388;
    font-size: 13px;
    letter-spacing: 1px;
    text-shadow: 0 0 5px #33ff3344;
  }
  #mobile-controls {
    display: none;
    margin-top: 15px;
    gap: 5px;
  }
  .d-btn {
    width: 55px; height: 55px;
    background: #1a331a;
    border: 2px solid #33ff33;
    color: #33ff33;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    box-shadow: 0 0 8px #33ff3344;
  }
  .d-btn:active {
    background: #33ff3333;
    box-shadow: 0 0 15px #33ff3388;
  }
  #d-pad {
    display: grid;
    grid-template-columns: 55px 55px 55px;
    grid-template-rows: 55px 55px 55px;
    gap: 4px;
  }
  #d-pad .empty { visibility: hidden; }
  @media (max-width: 700px) {
    #hud { width: 95vw; font-size: 14px; }
    canvas { width: 95vw; height: auto; }
    #mobile-controls { display: flex; justify-content: center; }
    #controls-hint { display: none; }
  }
</style>
</head>
<body>
<div id="scanlines"></div>
<div id="crt-flicker"></div>
<div id="game-wrapper">
  <div id="hud">
    <div>SCORE: <span id="score">0</span></div>
    <div>HIGH: <span id="highscore">0</span></div>
    <div>LEVEL: <span id="level">1</span></div>
  </div>
  <canvas id="game" width="640" height="480"></canvas>
  <div id="overlay">
    <h1>🐍 SNAKE</h1>
    <h2>8-BIT EDITION</h2>
    <p>PRESS ENTER OR TAP TO START</p>
  </div>
  <div id="controls-hint">ARROWS / WASD TO MOVE &bull; ENTER TO START &bull; P TO PAUSE</div>
  <div id="mobile-controls">
    <div id="d-pad">
      <div class="empty"></div>
      <div class="d-btn" data-dir="up">▲</div>
      <div class="empty"></div>
      <div class="d-btn" data-dir="left">◄</div>
      <div class="d-btn" data-dir="pause">⏸</div>
      <div class="d-btn" data-dir="right">►</div>
      <div class="empty"></div>
      <div class="d-btn" data-dir="down">▼</div>
      <div class="empty"></div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const scoreEl = document.getElementById('score');
  const highscoreEl = document.getElementById('highscore');
  const levelEl = document.getElementById('level');

  const COLS = 32;
  const ROWS = 24;
  const CELL = 20;
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;

  // Audio
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  function ensureAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
  }

  function playTone(freq, duration, type, vol) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol || 0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function sfxEat() {
    playTone(660, 0.06, 'square', 0.15);
    setTimeout(() => playTone(880, 0.06, 'square', 0.15), 60);
    setTimeout(() => playTone(1100, 0.08, 'square', 0.12), 120);
  }

  function sfxDie() {
    playTone(200, 0.15, 'sawtooth', 0.2);
    setTimeout(() => playTone(150, 0.15, 'sawtooth', 0.18), 100);
    setTimeout(() => playTone(100, 0.3, 'sawtooth', 0.15), 200);
  }

  function sfxMove() {
    playTone(120, 0.02, 'square', 0.03);
  }

  function sfxLevelUp() {
    [523, 659, 784, 1047].forEach((f, i) => {
      setTimeout(() => playTone(f, 0.12, 'square', 0.12), i * 100);
    });
  }

  // Game state
  let snake, dir, nextDir, food, specialFood, score, highscore, level, speed;
  let gameState; // 'menu', 'playing', 'paused', 'dead'
  let lastTime, accumulator;
  let particles = [];
  let gridFlash = 0;
  let specialFoodTimer = 0;

  highscore = parseInt(localStorage.getItem('snake8bit_high') || '0');
  highscoreEl.textContent = highscore;

  function init() {
    const midX = Math.floor(COLS / 2);
    const midY = Math.floor(ROWS / 2);
    snake = [
      { x: midX, y: midY },
      { x: midX - 1, y: midY },
      { x: midX - 2, y: midY },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    level = 1;
    speed = 130;
    scoreEl.textContent = '0';
    levelEl.textContent = '1';
    food = null;
    specialFood = null;
    specialFoodTimer = 0;
    particles = [];
    gridFlash = 0;
    placeFood();
  }

  function placeFood() {
    let pos;
    do {
      pos = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS)
      };
    } while (isOccupied(pos));
    food = pos;
  }

  function placeSpecialFood() {
    let pos;
    do {
      pos = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS)
      };
    } while (isOccupied(pos) || (food && pos.x === food.x && pos.y === food.y));
    specialFood = pos;
    specialFoodTimer = 200;
  }

  function isOccupied(pos) {
    return snake.some(s => s.x === pos.x && s.y === pos.y);
  }

  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x * CELL + CELL / 2,
        y: y * CELL + CELL / 2,
        vx: (Math.random() - 0.5) * 6,
        vy: (Math.random() - 0.5) * 6,
        life: 20 + Math.random() * 15,
        maxLife: 35,
        color: color,
        size: 2 + Math.random() * 3
      });
    }
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.94;
      p.vy *= 0.94;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    particles.forEach(p => {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(Math.floor(p.x), Math.floor(p.y), Math.ceil(p.size), Math.ceil(p.size));
    });
    ctx.globalAlpha = 1;
  }

  function update() {
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      die();
      return;
    }

    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      die();
      return;
    }

    snake.unshift(head);

    let ate = false;

    // Normal food
    if (food && head.x === food.x && head.y === food.y) {
      score += 10 * level;
      ate = true;
      sfxEat();
      spawnParticles(food.x, food.y, '#ff3333', 12);
      spawnParticles(food.x, food.y, '#ffaa00', 6);
      gridFlash = 5;
      scoreEl.textContent = score;
      food = null;
      placeFood();

      // Level up every 5 foods
      if (score > 0 && score % (50 * level) === 0) {
        level++;
        speed = Math.max(50, 130 - (level - 1) * 10);
        levelEl.textContent = level;
        sfxLevelUp();
        gridFlash = 10;
      }

      // Chance to spawn special food
      if (!specialFood && Math.random() < 0.3) {
        placeSpecialFood();
      }
    }

    // Special food (golden apple)
    if (specialFood && head.x === specialFood.x && head.y === specialFood.y) {
      score += 50 * level;
      ate = true;
      sfxEat();
      playTone(1320, 0.1, 'square', 0.15);
      spawnParticles(specialFood.x, specialFood.y, '#ffdd00', 20);
      spawnParticles(specialFood.x, specialFood.y, '#ffffff', 10);
      gridFlash = 8;
      scoreEl.textContent = score;
      specialFood = null;
      specialFoodTimer = 0;
    }

    if (!ate) {
      snake.pop();
      sfxMove();
    }

    // Special food timer
    if (specialFood) {
      specialFoodTimer--;
      if (specialFoodTimer <= 0) {
        spawnParticles(specialFood.x, specialFood.y, '#88660000', 5);
        specialFood = null;
      }
    }

    if (gridFlash > 0) gridFlash--;
  }

  function die() {
    sfxDie();
    snake.forEach((s, i) => {
      setTimeout(() => spawnParticles(s.x, s.y, '#33ff33', 4), i * 30);
    });
    if (score > highscore) {
      highscore = score;
      localStorage.setItem('snake8bit_high', highscore);
      highscoreEl.textContent = highscore;
    }
    gameState = 'dead';
    overlay.classList.remove('hidden');
    overlay.innerHTML = `
      <h2>GAME OVER</h2>
      <div class="score-display">SCORE: ${score}</div>
      <div class="score-display" style="font-size:16px;color:#33ff33;">BEST: ${highscore}</div>
      <p>PRESS ENTER OR TAP TO RESTART</p>
    `;
  }

  // Drawing
  function drawGrid() {
    ctx.fillStyle = '#000a00';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = gridFlash > 0 ? '#33ff3344' : '#0a1a0a';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(x * CELL, 0);
      ctx.lineTo(x * CELL, canvas.height);
      ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * CELL);
      ctx.lineTo(canvas.width, y * CELL);
      ctx.stroke();
    }

    // Border glow
    if (gridFlash > 0) {
      ctx.strokeStyle = `rgba(51,255,51,${gridFlash * 0.05})`;
      ctx.lineWidth = 3;
      ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);
    }
  }

  function drawSnake() {
    snake.forEach((seg, i) => {
      const px = seg.x * CELL;
      const py = seg.y * CELL;

      if (i === 0) {
        // Head
        ctx.fillStyle = '#44ff44';
        ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);

        // Eyes
        ctx.fillStyle = '#000000';
        let ex1, ey1, ex2, ey2;
        if (dir.x === 1) { ex1 = px+13; ey1 = py+4; ex2 = px+13; ey2 = py+12; }
        else if (dir.x === -1) { ex1 = px+4; ey1 = py+4; ex2 = px+4; ey2 = py+12; }
        else if (dir.y === -1) { ex1 = px+4; ey1 = py+4; ex2 = px+12; ey2 = py+4; }
        else { ex1 = px+4; ey1 = py+13; ex2 = px+12; ey2 = py+13; }
        ctx.fillRect(ex1, ey1, 3, 3);
        ctx.fillRect(ex2, ey2, 3, 3);

        // Eye shine
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(ex1, ey1, 1, 1);
        ctx.fillRect(ex2, ey2, 1, 1);

        // Tongue
        if (Math.floor(Date.now() / 200) % 2 === 0) {
          ctx.fillStyle = '#ff3333';
          if (dir.x === 1) ctx.fillRect(px + CELL, py + 8, 4, 2);
          else if (dir.x === -1) ctx.fillRect(px - 4, py + 8, 4, 2);
          else if (dir.y === -1) ctx.fillRect(px + 8, py - 4, 2, 4);
          else ctx.fillRect(px + 8, py + CELL, 2, 4);
        }

      } else {
        // Body - gradient from green to dark green
        const t = i / snake.length;
        const r = Math.floor(30 + t * 0);
        const g = Math.floor(180 - t * 100);
        const b = Math.floor(30 + t * 0);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);

        // Pixel pattern on body
        if (i % 2 === 0) {
          ctx.fillStyle = `rgba(0,0,0,0.2)`;
          ctx.fillRect(px + 4, py + 4, 4, 4);
          ctx.fillRect(px + 12, py + 12, 4, 4);
        }

        // Highlight
        ctx.fillStyle = 'rgba(100,255,100,0.15)';
        ctx.fillRect(px + 2, py + 2, 3, 3);
      }
    });
  }

  function drawFood() {
    if (!food) return;
    const px = food.x * CELL;
    const py = food.y * CELL;
    const t = Date.now() / 300;
    const bob = Math.sin(t) * 1;

    // Shadow
    ctx.fillStyle = 'rgba(255,0,0,0.15)';
    ctx.fillRect(px + 2, py + CELL - 3, CELL - 4, 3);

    // Apple body (8-bit style)
    ctx.fillStyle = '#ff2222';
    ctx.fillRect(px + 4, py + 4 + bob, 12, 12);
    ctx.fillRect(px + 3, py + 6 + bob, 14, 8);

    // Highlight
    ctx.fillStyle = '#ff8888';
    ctx.fillRect(px + 6, py + 5 + bob, 3, 3);

    // Stem
    ctx.fillStyle = '#664400';
    ctx.fillRect(px + 9, py + 1 + bob, 2, 4);

    // Leaf
    ctx.fillStyle = '#33cc33';
    ctx.fillRect(px + 10, py + 2 + bob, 4, 3);
    ctx.fillRect(px + 11, py + 1 + bob, 2, 1);

    // Pixel shine
    if (Math.floor(Date.now() / 500) % 2 === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(px + 7, py + 7 + bob, 2, 2);
    }
  }

  function drawSpecialFood() {
    if (!specialFood) return;
    const px = specialFood.x * CELL;
    const py = specialFood.y * CELL;
    const t = Date.now() / 200;
    const bob = Math.sin(t) * 2;
    const fade = specialFoodTimer < 50 ? (specialFoodTimer % 6 < 3 ? 1 : 0.2) : 1;

    ctx.globalAlpha = fade;

    // Glow
    ctx.fillStyle = `rgba(255,220,0,${0.1 + Math.sin(t * 2) * 0.05})`;
    ctx.fillRect(px - 2, py - 2, CELL + 4, CELL + 4);

    // Star/apple hybrid
    ctx.fillStyle = '#ffdd00';
    ctx.fillRect(px + 3, py + 3 + bob, 14, 14);
    ctx.fillRect(px + 5, py + 1 + bob, 10, 16);

    ctx.fillStyle = '#ffee66';
    ctx.fillRect(px + 7, py + 5 + bob, 4, 4);

    // Sparkle
    ctx.fillStyle = '#ffffff';
    const sx = px + 5 + Math.floor(Math.sin(t * 3) * 3);
    const sy = py + 5 + Math.floor(Math.cos(t * 3) * 3);
    ctx.fillRect(sx, sy, 2, 2);

    ctx.globalAlpha = 1;
  }

  function draw() {
    drawGrid();
    drawFood();
    drawSpecialFood();
    drawSnake();
    drawParticles();

    // Pause overlay
    if (gameState === 'paused') {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#33ff33';
      ctx.font = '36px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
      ctx.font = '16px Courier New';
      ctx.fillText('Press P to resume', canvas.width / 2, canvas.height / 2 + 30);
    }
  }

  // Game loop
  function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const delta = timestamp - lastTime;
    lastTime = timestamp;

    if (gameState === 'playing') {
      accumulator += delta;
      while (accumulator >= speed) {
        accumulator -= speed;
        update();
        if (gameState !== 'playing') break;
      }
    }

    updateParticles();
    draw();
    requestAnimationFrame(gameLoop);
  }

  // Input
  document.addEventListener('keydown', (e) => {
    ensureAudio();

    if (e.key === 'Enter') {
      if (gameState === 'menu' || gameState === 'dead') {
        startGame();
      }
      return;
    }

    if (e.key === 'p' || e.key === 'P') {
      if (gameState === 'playing') {
        gameState = 'paused';
      } else if (gameState === 'paused') {
        gameState = 'playing';
        accumulator = 0;
        lastTime = null;
      }
      return;
    }

    if (gameState !== 'playing') return;

    switch (e.key) {
      case 'ArrowUp': case 'w': case 'W':
        if (dir.y !== 1) nextDir = { x: 0, y: -1 };
        e.preventDefault();
        break;
      case 'ArrowDown': case 's': case 'S':
        if (dir.y !== -1) nextDir = { x: 0, y: 1 };
        e.preventDefault();
        break;
      case 'ArrowLeft': case 'a': case 'A':
        if (dir.x !== 1) nextDir = { x: -1, y: 0 };
        e.preventDefault();
        break;
      case 'ArrowRight': case 'd': case 'D':
        if (dir.x !== -1) nextDir = { x: 1, y: 0 };
        e.preventDefault();
        break;
    }
  });

  // Mobile controls
  document.querySelectorAll('.d-btn').forEach(btn => {
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      ensureAudio();
      const d = btn.dataset.dir;
      if (d === 'pause') {
        if (gameState === 'playing') gameState = 'paused';
        else if (gameState === 'paused') { gameState = 'playing'; accumulator = 0; lastTime = null; }
        return;
      }
      if (gameState === 'menu' || gameState === 'dead') {
        startGame();
        return;
      }
      if (gameState !== 'playing') return;
      switch (d) {
        case 'up': if (dir.y !== 1) nextDir = { x: 0, y: -1 }; break;
        case 'down': if (dir.y !== -1) nextDir = { x: 0, y: 1 }; break;
        case 'left': if (dir.x !== 1) nextDir = { x: -1, y: 0 }; break;
        case 'right': if (dir.x !== -1) nextDir = { x: 1, y: 0 }; break;
      }
    });
  });

  // Tap canvas to start
  canvas.addEventListener('click', () => {
    ensureAudio();
    if (gameState === 'menu' || gameState === 'dead') {
      startGame();
    }
  });

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    ensureAudio();
    if (gameState === 'menu' || gameState === 'dead') {
      startGame();
    }
  });

  function startGame() {
    init();
    gameState = 'playing';
    overlay.classList.add('hidden');
    accumulator = 0;
    lastTime = null;
  }

  // Init menu state
  gameState = 'menu';
  accumulator = 0;
  init();
  draw();
  requestAnimationFrame(gameLoop);

})();
</script>
</body>
</html>
