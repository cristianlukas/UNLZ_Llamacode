<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 SNAKE 8-BIT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f0f;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden;image-rendering:pixelated}
#scanlines{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px)}
#wrapper{position:relative;display:flex;flex-direction:column;align-items:center;gap:8px}
#hud{display:flex;justify-content:space-between;width:480px;color:#55ff55;font-size:18px;text-shadow:0 0 6px #55ff55;letter-spacing:2px;padding:4px 0}
#hud span{font-weight:bold}
canvas{border:4px solid #333;box-shadow:0 0 8px #000,0 0 20px rgba(85,255,85,.15),inset 0 0 40px rgba(0,0,0,.5);image-rendering:pixelated;image-rendering:crisp-edges;background:#111}
#overlay{position:absolute;top:0;left:0;width:480px;height:480px;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,.85);z-index:10;transition:opacity .3s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-size:48px;color:#55ff55;text-shadow:4px 4px 0 #004400,0 0 20px #55ff55;margin-bottom:8px;letter-spacing:6px}
#overlay h2{font-size:28px;color:#ff4444;text-shadow:2px 2px 0 #440000;margin-bottom:12px}
#overlay p{color:#aaa;font-size:14px;margin:4px 0;text-align:center;line-height:1.6}
.blink{animation:blink 1s step-end infinite;color:#ffff55;font-size:16px;margin-top:20px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@media(max-width:520px){canvas{width:95vw;height:95vw}#hud{width:95vw;font-size:14px}#overlay{width:95vw;height:95vw}}
</style>
</head>
<body>
<div id="scanlines"></div>
<div id="wrapper">
  <div id="hud"><div>SCORE: <span id="score">0</span></div><div>HIGH: <span id="highscore">0</span></div></div>
  <canvas id="game" width="480" height="480"></canvas>
  <div id="overlay">
    <h1>🐍 SNAKE</h1>
    <p>8-BIT EDITION</p>
    <p class="blink">PRESS ENTER OR TAP TO START</p>
    <p>ARROWS / WASD to move</p>
  </div>
</div>
<script>
(function(){
"use strict";
var canvas=document.getElementById("game");
var ctx=canvas.getContext("2d");
var overlay=document.getElementById("overlay");
var scoreEl=document.getElementById("score");
var highEl=document.getElementById("highscore");
var GRID=24,CELL=canvas.width/GRID,BASE_SPEED=130,SPEED_MIN=60,SPEED_STEP=2;
var snake,dir,nextDir,food,bonus,score,highScore,state,speed,tickTimer,particles,frameCount,bonusTimer;
var audioCtx=null;
highScore=parseInt(localStorage.getItem("snake8bit_high")||"0");
highEl.textContent=highScore;

function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type,vol){if(!audioCtx)return;try{var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type||"square";o.frequency.value=freq;g.gain.value=vol||.08;g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}catch(e){}}
function sfxEat(){playTone(600,.08,"square",.1);setTimeout(function(){playTone(900,.06,"square",.08)},50)}
function sfxBonus(){playTone(500,.05,"square",.1);setTimeout(function(){playTone(700,.05,"square",.1)},60);setTimeout(function(){playTone(1000,.08,"square",.1)},120)}
function sfxDie(){playTone(200,.15,"sawtooth",.12);setTimeout(function(){playTone(150,.15,"sawtooth",.1)},100);setTimeout(function(){playTone(100,.3,"sawtooth",.08)},200)}

function spawnParticles(x,y,color,count){for(var i=0;i<count;i++){particles.push({x:x*CELL+CELL/2,y:y*CELL+CELL/2,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:20+Math.random()*15,maxLife:35,color:color||["#ff3333","#ffdd33","#33ff33","#33ccff","#ff66ff"][Math.floor(Math.random()*5)],size:2+Math.random()*3})}}
function updateParticles(){for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0)particles.splice(i,1)}}
function drawParticles(){for(var i=0;i<particles.length;i++){var p=particles[i];var a=p.life/p.maxLife;ctx.globalAlpha=a;ctx.fillStyle=p.color;var s=Math.ceil(p.size*a);ctx.fillRect(Math.floor(p.x-s/2),Math.floor(p.y-s/2),s,s)}ctx.globalAlpha=1}

function randomFreeCell(){var occ={};for(var i=0;i<snake.length;i++)occ[snake[i].x+","+snake[i].y]=1;if(food)occ[food.x+","+food.y]=1;if(bonus)occ[bonus.x+","+bonus.y]=1;for(var a=0;a<500;a++){var x=Math.floor(Math.random()*GRID),y=Math.floor(Math.random()*GRID);if(!occ[x+","+y])return{x:x,y:y}}return{x:0,y:0}}

function initGame(){var mid=Math.floor(GRID/2);snake=[{x:mid,y:mid},{x:mid-1,y:mid},{x:mid-2,y:mid}];dir={x:1,y:0};nextDir={x:1,y:0};score=0;speed=BASE_SPEED;particles=[];bonus=null;bonusTimer=0;frameCount=0;scoreEl.textContent="0";food=randomFreeCell();state="playing";overlay.classList.add("hidden");tickTimer=0}

function update(){frameCount++;tickTimer++;if(tickTimer>=Math.floor(1000/speed)){tickTimer=0;dir=nextDir;var head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};if(head.x<0||head.x>=GRID||head.y<0||head.y>=GRID){die();return}for(var i=0;i<snake.length;i++){if(snake[i].x===head.x&&snake[i].y===head.y){die();return}}snake.unshift(head);var ate=false;if(head.x===food.x&&head.y===food.y){score+=10;ate=true;sfxEat();spawnParticles(food.x,food.y,"#ff3333",12);food=randomFreeCell();speed=Math.max(SPEED_MIN,BASE_SPEED-Math.floor(score/10)*SPEED_STEP)}if(bonus&&head.x===bonus.x&&head.y===bonus.y){score+=50;ate=true;sfxBonus();spawnParticles(bonus.x,bonus.y,"#ffdd33",20);bonus=null;bonusTimer=0}if(!ate)snake.pop();scoreEl.textContent=score;if(!bonus){bonusTimer++;if(bonusTimer>40+Math.floor(Math.random()*20)){bonus=randomFreeCell();bonusTimer=-60}}}updateParticles()}

function die(){state="dead";sfxDie();for(var i=0;i<snake.length;i++)spawnParticles(snake[i].x,snake[i].y,"#22cc22",3);if(score>highScore){highScore=score;localStorage.setItem("snake8bit_high",highScore);highEl.textContent=highScore}setTimeout(function(){overlay.classList.remove("hidden");overlay.innerHTML='<h2>GAME OVER</h2><p style="color:#55ff55;font-size:20px">SCORE: '+score+'</p><p style="color:#aaa;font-size:14px">HIGH: '+highScore+'</p><p class="blink">PRESS ENTER TO RETRY</p>'},500)}

function drawGrid(){ctx.fillStyle="#0a0a1a";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle="#0f0f2a";ctx.lineWidth=.5;for(var i=0;i<=GRID;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,canvas.height);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(canvas.width,i*CELL);ctx.stroke()}}

function drawSnake(){for(var i=snake.length-1;i>=0;i--){var s=snake[i],px=s.x*CELL,py=s.y*CELL;if(i===0){ctx.fillStyle="#33ff33";ctx.fillRect(px+1,py+1,CELL-2,CELL-2);ctx.fillStyle="#000";var ex1=dir.x===1?px+13:dir.x===-1?px+4:px+5,ex2=dir.x===1?px+13:dir.x===-1?px+4:px+11,ey1=dir.y===1?py+13:dir.y===-1?py+4:py+4,ey2=dir.y===1?py+13:dir.y===-1?py+4:py+11;if(dir.x!==0){ctx.fillRect(ex1,py+4,3,3);ctx.fillRect(ex2,py+13,3,3)}else{ctx.fillRect(px+4,ey1,3,3);ctx.fillRect(px+13,ey2,3,3)}ctx.fillStyle="#fff";if(dir.x!==0){ctx.fillRect(ex1+1,py+5,1,1);ctx.fillRect(ex2+1,py+14,1,1)}else{ctx.fillRect(px+5,ey1+1,1,1);ctx.fillRect(px+14,ey2+1,1,1)}}else{ctx.fillStyle=i%3===0?"#119911":"#22cc22";ctx.fillRect(px+1,py+1,CELL-2,CELL-2);ctx.fillStyle="rgba(255,255,255,.1)";ctx.fillRect(px+2,py+2,4,4)}}}

function drawApple(fx,fy){var px=fx*CELL,py=fy*CELL,bob=Math.sin(frameCount*.1)*1.5;ctx.fillStyle="#ff3333";ctx.fillRect(px+3,py+4+bob,14,14);ctx.fillRect(px+4,py+2+bob,12,1);ctx.fillRect(px+2,py+6+bob,1,10);ctx.fillRect(px+17,py+6+bob,1,10);ctx.fillStyle="rgba(255,255,255,.4)";ctx.fillRect(px+5,py+5+bob,3,3);ctx.fillStyle="#55aa33";ctx.fillRect(px+9,py+1+bob,2,3);ctx.fillStyle="#33cc33";ctx.fillRect(px+11,py+1+bob,4,2)}

function drawBonus(bx,by){var px=bx*CELL,py=by*CELL,pulse=Math.sin(frameCount*.15)>0;ctx.fillStyle=pulse?"#ffdd33":"#ffaa00";ctx.fillRect(px+8,py+2,4,16);ctx.fillRect(px+2,py+8,16,4);ctx.fillRect(px+4,py+4,8,8);ctx.fillRect(px+6,py+6,4,4);ctx.fillStyle="#fff";ctx.fillRect(px+9,py+3,2,2)}

function draw(){drawGrid();if(state==="playing"||state==="dead"){if(food)drawApple(food.x,food.y);if(bonus)drawBonus(bonus.x,bonus.y);if(state==="dead")ctx.globalAlpha=.5;drawSnake();ctx.globalAlpha=1;drawParticles()}}

function gameLoop(){if(state==="playing")update();draw();requestAnimationFrame(gameLoop)}

document.addEventListener("keydown",function(e){if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space","Enter"].indexOf(e.code)>=0)e.preventDefault();if(state!=="playing"){if(e.code==="Enter"||e.code==="Space"){initAudio();initGame()}return}switch(e.code){case"ArrowUp":case"KeyW":if(dir.y!==1)nextDir={x:0,y:-1};break;case"ArrowDown":case"KeyS":if(dir.y!==-1)nextDir={x:0,y:1};break;case"ArrowLeft":case"KeyA":if(dir.x!==1)nextDir={x:-1,y:0};break;case"ArrowRight":case"KeyD":if(dir.x!==-1)nextDir={x:1,y:0};break}});

overlay.addEventListener("click",function(){initAudio();initGame()});
overlay.addEventListener("touchend",function(e){e.preventDefault();initAudio();initGame()});

var tsx=0,tsy=0;
canvas.addEventListener("touchstart",function(e){tsx=e.touches[0].clientX;tsy=e.touches[0].clientY},{passive:true});
canvas.addEventListener("touchend",function(e){var dx=e.changedTouches[0].clientX-tsx,dy=e.changedTouches[0].clientY-tsy;if(Math.max(Math.abs(dx),Math.abs(dy))<20)return;if(Math.abs(dx)>Math.abs(dy)){if(dx>0&&dir.x!==-1)nextDir={x:1,y:0};else if(dx<0&&dir.x!==1)nextDir={x:-1,y:0}}else{if(dy>0&&dir.y!==-1)nextDir={x:0,y:1};else if(dy<0&&dir.y!==1)nextDir={x:0,y:-1}}},{passive:true});

state="menu";particles=[];food={x:Math.floor(GRID/2),y:Math.floor(GRID/2)};snake=[];dir={x:1,y:0};nextDir={x:1,y:0};
gameLoop();
})();
</script>
</body>
</html>
