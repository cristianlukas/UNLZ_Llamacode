<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 SNAKE 8-BIT</title>
<style>
  @font-face {
    font-family: 'PixelFont';
    src: url('data:font/woff2;base64,') format('woff2');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f23;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    image-rendering: pixelated;
  }
  #wrapper {
    position: relative;
    border: 4px solid #555;
    box-shadow: 0 0 20px rgba(0,255,0,0.15), inset 0 0 40px rgba(0,0,0,0.5);
    border-radius: 4px;
  }
  canvas { display: block; image-rendering: pixelated; }
  #ui {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between;
    padding: 6px 12px;
    color: #33ff33;
    font-size: 16px;
    font-weight: bold;
    text-shadow: 0 0 6px #0f0, 2px 2px 0 #000;
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 2;
  }
  #overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: rgba(0,0,0,0.82);
    color: #33ff33;
    z-index: 3;
    text-align: center;
  }
  #overlay.hidden { display: none; }
  #overlay h1 {
    font-size: 42px;
    text-shadow: 3px 3px 0 #004400, 0 0 20px #0f0;
    margin-bottom: 10px;
    letter-spacing: 6px;
  }
  #overlay h2 {
    font-size: 28px;
    color: #ff4444;
    text-shadow: 2px 2px 0 #440000, 0 0 15px #f00;
    margin-bottom: 10px;
  }
  #overlay p {
    font-size: 14px;
    color: #88ff88;
    margin: 6px 0;
    text-shadow: 0 0 4px #0a0;
  }
  #overlay .score-final {
    font-size: 20px;
    color: #ffff44;
    text-shadow: 0 0 10px #ff0;
  }
  #overlay .blink {
    animation: blink 1s step-end infinite;
    margin-top: 20px;
    font-size: 16px;
    color: #ffffff;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  #mobile-controls {
    display: none;
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
  }
  .ctrl-row { display: flex; justify-content: center; gap: 4px; }
  .ctrl-btn {
    width: 56px; height: 56px;
    background: rgba(0,255,0,0.12);
    border: 2px solid rgba(0,255,0,0.35);
    border-radius: 6px;
    color: #33ff33;
    font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  .ctrl-btn:active { background: rgba(0,255,0,0.35); }
  .ctrl-spacer { width: 56px; height: 56px; }
  @media (pointer: coarse) {
    #mobile-controls { display: block; }
  }
</style>
</head>
<body>

<div id="wrapper">
  <canvas id="game"></canvas>
  <div id="ui">
    <span id="score-display">SCORE: 0</span>
    <span id="high-display">HI: 0</span>
  </div>
  <div id="overlay">
    <h1>🐍 SNAKE</h1>
    <p>8-BIT EDITION</p>
    <p>Usá ← ↑ ↓ → o WASD para moverte</p>
    <p class="blink">Presioná ENTER o tocá para jugar</p>
  </div>
</div>

<div id="mobile-controls">
  <div class="ctrl-row">
    <div class="ctrl-spacer"></div>
    <div class="ctrl-btn" data-dir="up">▲</div>
    <div class="ctrl-spacer"></div>
  </div>
  <div class="ctrl-row">
    <div class="ctrl-btn" data-dir="left">◄</div>
    <div class="ctrl-btn" data-dir="down">▼</div>
    <div class="ctrl-btn" data-dir="right">►</div>
  </div>
</div>

<script>
// ============================================================
//  SNAKE 8-BIT — Single-file retro game
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score-display');
const highEl = document.getElementById('high-display');

// --- Grid config ---
const COLS = 25, ROWS = 25;
const CELL = 20;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

// --- NES-ish palette ---
const PAL = {
  bg: '#0f0f23',
  grid: '#1a1a33',
  snakeHead: '#33ff33',
  snakeBody: '#22cc22',
  snakeTail: '#119911',
  eye: '#000',
  apple: '#ff3333',
  appleStem: '#8B4513',
  bonus: '#ffff33',
  border: '#333355',
  particle: ['#33ff33','#ff3333','#ffff33','#ff8833','#33ffff'],
};

// --- Audio (Web Audio API, no external files) ---
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, dur, type='square', vol=0.12) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}
function sfxEat()  { playTone(660, 0.08); setTimeout(()=>playTone(880, 0.1), 60); }
function sfxDir()  { playTone(220, 0.04, 'square', 0.06); }
function sfxDie()  {
  playTone(300, 0.15);
  setTimeout(()=>playTone(200, 0.15), 120);
  setTimeout(()=>playTone(100, 0.3), 240);
}
function sfxBonus() {
  playTone(523, 0.06); setTimeout(()=>playTone(659, 0.06), 60);
  setTimeout(()=>playTone(784, 0.06), 120); setTimeout(()=>playTone(1047, 0.12), 180);
}

// --- Game state ---
let snake, dir, nextDir, apple, bonus, score, highScore, speed;
let particles = [];
let gameState = 'idle'; // idle | playing | dead
let tickTimer = 0;
let lastTime = 0;
let shakeX = 0, shakeY = 0, shakeDur = 0;
let bonusTimer = 0;
let frameCount = 0;

highScore = parseInt(localStorage.getItem('snake8bit_hi') || '0');
highEl.textContent = 'HI: ' + highScore;

function initGame() {
  const cx = Math.floor(COLS/2), cy = Math.floor(ROWS/2);
  snake = [
    {x: cx, y: cy},
    {x: cx-1, y: cy},
    {x: cx-2, y: cy},
  ];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  speed = 130;
  particles = [];
  bonus = null;
  bonusTimer = 0;
  shakeDur = 0;
  scoreEl.textContent = 'SCORE: 0';
  placeApple();
}

function placeApple() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
  } while (cellOccupied(pos));
  apple = pos;
}

function placeBonus() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
  } while (cellOccupied(pos) || (pos.x === apple.x && pos.y === apple.y));
  bonus = pos;
  bonusTimer = 180; // ~3 seconds at 60fps
}

function cellOccupied(p) {
  return snake.some(s => s.x === p.x && s.y === p.y);
}

// --- Particles ---
function spawnParticles(x, y, color, count=8) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x: x * CELL + CELL/2,
      y: y * CELL + CELL/2,
      vx: (Math.random()-0.5)*5,
      vy: (Math.random()-0.5)*5,
      life: 20 + Math.random()*20,
      maxLife: 40,
      color: color || PAL.particle[Math.floor(Math.random()*PAL.particle.length)],
      size: 2 + Math.random()*3,
    });
  }
}

function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), Math.ceil(p.size), Math.ceil(p.size));
  }
  ctx.globalAlpha = 1;
}

// --- Screen shake ---
function triggerShake(dur) {
  shakeDur = dur;
}

// --- Input ---
const KEY_MAP = {
  'ArrowUp':    {x: 0, y:-1}, 'KeyW': {x: 0, y:-1},
  'ArrowDown':  {x: 0, y: 1}, 'KeyS': {x: 0, y: 1},
  'ArrowLeft':  {x:-1, y: 0}, 'KeyA': {x:-1, y: 0},
  'ArrowRight': {x: 1, y: 0}, 'KeyD': {x: 1, y: 0},
};

document.addEventListener('keydown', e => {
  if (e.code === 'Enter') {
    if (gameState === 'idle' || gameState === 'dead') {
      initAudio();
      initGame();
      gameState = 'playing';
      overlay.classList.add('hidden');
      e.preventDefault();
      return;
    }
  }
  if (gameState !== 'playing') return;
  const nd = KEY_MAP[e.code];
  if (nd && !(nd.x === -dir.x && nd.y === -dir.y)) {
    nextDir = nd;
    sfxDir();
    e.preventDefault();
  }
});

// Mobile controls
document.querySelectorAll('.ctrl-btn').forEach(btn => {
  const handler = e => {
    e.preventDefault();
    initAudio();
    if (gameState !== 'playing') {
      initGame();
      gameState = 'playing';
      overlay.classList.add('hidden');
      return;
    }
    const map = { up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0} };
    const nd = map[btn.dataset.dir];
    if (nd && !(nd.x === -dir.x && nd.y === -dir.y)) {
      nextDir = nd;
      sfxDir();
    }
  };
  btn.addEventListener('touchstart', handler, {passive:false});
  btn.addEventListener('mousedown', handler);
});

// Touch overlay
overlay.addEventListener('click', () => {
  initAudio();
  initGame();
  gameState = 'playing';
  overlay.classList.add('hidden');
});
overlay.addEventListener('touchstart', () => {
  initAudio();
  initGame();
  gameState = 'playing';
  overlay.classList.add('hidden');
}, {passive:true});

// --- Game logic ---
function tick() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    die(); return;
  }
  // Self collision
  if (cellOccupied(head)) {
    die(); return;
  }

  snake.unshift(head);

  let ate = false;
  if (head.x === apple.x && head.y === apple.y) {
    score += 10;
    ate = true;
    sfxEat();
    spawnParticles(apple.x, apple.y, PAL.apple, 12);
    placeApple();
    // Speed up
    speed = Math.max(55, speed - 2);
    // Random bonus spawn
    if (!bonus && Math.random() < 0.25) placeBonus();
  } else if (bonus && head.x === bonus.x && head.y === bonus.y) {
    score += 50;
    ate = true;
    sfxBonus();
    spawnParticles(bonus.x, bonus.y, PAL.bonus, 20);
    bonus = null;
    bonusTimer = 0;
  } else {
    snake.pop();
  }

  scoreEl.textContent = 'SCORE: ' + score;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snake8bit_hi', highScore);
    highEl.textContent = 'HI: ' + highScore;
  }
}

function die() {
  gameState = 'dead';
  sfxDie();
  triggerShake(15);
  // Explosion on each segment
  for (const s of snake) spawnParticles(s.x, s.y, null, 4);
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h2>GAME OVER</h2>
    <p class="score-final">Score: ${score}</p>
    <p>High Score: ${highScore}</p>
    <p class="blink">ENTER para reiniciar</p>
  `;
}

// --- Drawing ---
function drawGrid() {
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = PAL.grid;
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(canvas.width, y*CELL); ctx.stroke();
  }
}

function drawBorder() {
  ctx.strokeStyle = PAL.border;
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, canvas.width-2, canvas.height-2);
}

function drawSnake() {
  for (let i = 0; i < snake.length; i++) {
    const s = snake[i];
    const px = s.x * CELL, py = s.y * CELL;
    const t = i / snake.length;
    // Gradient from head to tail
    const r = Math.floor(51 + (17-51)*t);
    const g = Math.floor(255 + (153-255)*t);
    const b = Math.floor(51 + (17-51)*t);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(px+1, py+1, CELL-2, CELL-2);

    // Pixel detail: lighter top-left
    ctx.fillStyle = `rgba(255,255,255,0.15)`;
    ctx.fillRect(px+1, py+1, CELL-2, 3);
    ctx.fillRect(px+1, py+1, 3, CELL-2);

    // Darker bottom-right
    ctx.fillStyle = `rgba(0,0,0,0.2)`;
    ctx.fillRect(px+1, py+CELL-4, CELL-2, 3);
    ctx.fillRect(px+CELL-4, py+1, 3, CELL-2);

    // Head: eyes
    if (i === 0) {
      ctx.fillStyle = PAL.eye;
      const eyeSize = 3;
      let e1x, e1y, e2x, e2y;
      if (dir.x === 1) { e1x=px+13; e1y=py+4; e2x=px+13; e2y=py+13; }
      else if (dir.x === -1) { e1x=px+4; e1y=py+4; e2x=px+4; e2y=py+13; }
      else if (dir.y === -1) { e1x=px+4; e1y=py+4; e2x=px+13; e2y=py+4; }
      else { e1x=px+4; e1y=py+13; e2x=px+13; e2y=py+13; }
      ctx.fillRect(e1x, e1y, eyeSize, eyeSize);
      ctx.fillRect(e2x, e2y, eyeSize, eyeSize);
      // Tongue
      if (frameCount % 30 < 15) {
        ctx.fillStyle = '#ff4444';
        if (dir.x === 1) ctx.fillRect(px+CELL, py+8, 4, 2);
        else if (dir.x === -1) ctx.fillRect(px-4, py+8, 4, 2);
        else if (dir.y === -1) ctx.fillRect(px+8, py-4, 2, 4);
        else ctx.fillRect(px+8, py+CELL, 2, 4);
      }
    }
  }
}

function drawApple() {
  if (!apple) return;
  const px = apple.x * CELL, py = apple.y * CELL;
  // Apple body (pixel art style)
  ctx.fillStyle = PAL.apple;
  ctx.fillRect(px+3, py+3, CELL-6, CELL-6);
  ctx.fillRect(px+2, py+5, CELL-4, CELL-8);
  // Highlight
  ctx.fillStyle = '#ff8888';
  ctx.fillRect(px+4, py+4, 3, 3);
  // Shadow
  ctx.fillStyle = '#aa0000';
  ctx.fillRect(px+CELL-6, py+CELL-6, 3, 3);
  // Stem
  ctx.fillStyle = PAL.appleStem;
  ctx.fillRect(px+9, py+1, 2, 4);
  // Leaf
  ctx.fillStyle = '#33cc33';
  ctx.fillRect(px+11, py+1, 4, 3);
}

function drawBonus() {
  if (!bonus) return;
  const px = bonus.x * CELL, py = bonus.y * CELL;
  // Pulsating star
  const pulse = Math.sin(frameCount * 0.15) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = PAL.bonus;
  // Diamond shape
  const cx = px + CELL/2, cy = py + CELL/2;
  ctx.beginPath();
  ctx.moveTo(cx, py+2);
  ctx.lineTo(px+CELL-2, cy);
  ctx.lineTo(cx, py+CELL-2);
  ctx.lineTo(px+2, cy);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(cx-1, cy-1, 2, 2);
  ctx.globalAlpha = 1;
}

function drawScanlines() {
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  for (let y = 0; y < canvas.height; y += 2) {
    ctx.fillRect(0, y, canvas.width, 1);
  }
}

// --- Main loop ---
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  frameCount++;
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  // Shake decay
  if (shakeDur > 0) {
    shakeX = (Math.random()-0.5) * 6;
    shakeY = (Math.random()-0.5) * 6;
    shakeDur--;
  } else {
    shakeX = 0; shakeY = 0;
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawGrid();

  if (gameState === 'playing' || gameState === 'dead') {
    // Tick
    if (gameState === 'playing') {
      tickTimer += dt;
      while (tickTimer >= speed) {
        tickTimer -= speed;
        tick();
        if (gameState !== 'playing') break;
      }
      // Bonus timer
      if (bonus) {
        bonusTimer--;
        if (bonusTimer <= 0) {
          spawnParticles(bonus.x, bonus.y, '#666', 6);
          bonus = null;
        }
      }
    }
    drawApple();
    drawBonus();
    drawSnake();
    drawParticles();
    updateParticles();
    drawBorder();
  }

  drawScanlines();
  ctx.restore();
}

// Start
initGame();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
